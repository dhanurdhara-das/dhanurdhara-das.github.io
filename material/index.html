<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Course Material - Dhanurdhara Das Ananda</title>
    <link rel="icon" type="image/png" href="../img/ddd-favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #e6cc00;
            --primary-dark: #dac202;
            --primary-light: #f5e666;
            --text-dark: #333;
            --text-light: #666;
            --bg-light: #f9f9f9;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background-color: #f4f3f3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 4px 24px var(--shadow);
            padding: 3rem 2.5rem;
            text-align: center;
        }

        .logo {
            width: 120px;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 1.6rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .password-form {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .password-input {
            flex: 1;
            padding: 0.85rem 1.2rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            outline: none;
        }

        .password-input:focus {
            border-color: var(--primary-color);
        }

        .submit-btn {
            padding: 0.85rem 1.8rem;
            background: var(--primary-color);
            color: var(--text-dark);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #d32f2f;
            font-size: 0.9rem;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .files-section {
            display: none;
            text-align: left;
            margin-top: 1.5rem;
        }

        .files-section.visible {
            display: block;
        }

        .files-header {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--primary-color);
        }

        .file-list {
            list-style: none;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.85rem 1rem;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            background: var(--bg-light);
            transition: background 0.2s ease;
        }

        .file-item:hover {
            background: #f0eeee;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            min-width: 0;
        }

        .file-icon {
            width: 36px;
            height: 36px;
            background: var(--primary-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .file-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--text-dark);
        }

        .file-name {
            font-size: 0.95rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            background: var(--primary-color);
            color: var(--text-dark);
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background 0.3s ease;
            flex-shrink: 0;
        }

        .download-btn:hover {
            background: var(--primary-dark);
        }

        .download-btn svg {
            width: 14px;
            height: 14px;
            fill: var(--text-dark);
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--text-dark);
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
            }

            .password-form {
                flex-direction: column;
            }

            .file-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }

            .download-btn {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="../img/ddd-logo-new.png" alt="Dhanurdhara Das Ananda" class="logo">
        <h1>Course Material</h1>
        <p class="subtitle">Enter the access code provided by your instructor</p>

        <form class="password-form" id="password-form">
            <input type="password" class="password-input" id="password-input" placeholder="Access code" autocomplete="off">
            <button type="submit" class="submit-btn">Access</button>
        </form>
        <p class="error-message" id="error-message">Invalid access code. Please try again.</p>

        <div class="files-section" id="files-section">
            <div class="files-header" id="files-header"></div>
            <ul class="file-list" id="file-list"></ul>
        </div>

        <a href="/" class="back-link">&larr; Back to main site</a>
    </div>

    <script src="config.js"></script>
    <script>
        const form = document.getElementById('password-form');
        const input = document.getElementById('password-input');
        const errorMsg = document.getElementById('error-message');
        const filesSection = document.getElementById('files-section');
        const filesHeader = document.getElementById('files-header');
        const fileList = document.getElementById('file-list');

        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password.trim());
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function renderFiles(course) {
            filesHeader.textContent = course.title;
            fileList.innerHTML = '';

            course.files.forEach(file => {
                const li = document.createElement('li');
                li.className = 'file-item';
                li.innerHTML = `
                    <div class="file-info">
                        <div class="file-icon">
                            <svg viewBox="0 0 24 24"><path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z"/></svg>
                        </div>
                        <span class="file-name">${file.name}</span>
                    </div>
                    <a href="${file.path}" download class="download-btn">
                        <svg viewBox="0 0 24 24"><path d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z"/></svg>
                        Download
                    </a>
                `;
                fileList.appendChild(li);
            });

            filesSection.classList.add('visible');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = input.value;

            if (!password) return;

            const hash = await hashPassword(password);
            const course = MATERIAL_CONFIG[hash];

            if (course) {
                errorMsg.classList.remove('visible');
                form.style.display = 'none';
                document.querySelector('.subtitle').style.display = 'none';
                renderFiles(course);
            } else {
                errorMsg.classList.add('visible');
                input.value = '';
                input.focus();
            }
        });

        input.addEventListener('input', () => {
            errorMsg.classList.remove('visible');
        });
    </script>
</body>
</html>
